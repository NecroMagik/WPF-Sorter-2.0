name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore WPF-Sorter-2.0/WPF-Sorter-2.0.csproj

    - name: Build
      run: dotnet build WPF-Sorter-2.0/WPF-Sorter-2.0.csproj --configuration Release --no-restore

    # 👇 1. Сборка портабельной версии (нужен .NET Runtime)
    - name: Publish Portable
      run: dotnet publish WPF-Sorter-2.0/WPF-Sorter-2.0.csproj --configuration Release --runtime win-x64 --self-contained false --output ./publish-portable

    # 👇 2. Сборка Single EXE (самодостаточный)
    - name: Publish Single EXE
      run: |
        dotnet publish WPF-Sorter-2.0/WPF-Sorter-2.0.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          /p:DebugType=None `
          /p:DebugSymbols=false `
          --output ./publish-single

    # 👇 3. Упаковка портабельной версии в ZIP
    - name: Create Portable ZIP
      run: |
        Compress-Archive -Path ./publish-portable/* -DestinationPath ./WPF-Sorter-2.0-Portable.zip -Force

    # 👇 4. Переименование Single EXE (уберем лишние файлы, оставим только exe)
    - name: Prepare Single EXE
      run: |
        # Копируем только exe в отдельную папку
        New-Item -ItemType Directory -Path ./publish-single-final -Force
        Copy-Item ./publish-single/WPF-Sorter-2.0.exe ./publish-single-final/
        
        # Генерируем хэш для exe
        $hash = (Get-FileHash -Path ./publish-single-final/WPF-Sorter-2.0.exe -Algorithm SHA256).Hash
        "$hash  WPF-Sorter-2.0.exe" | Out-File -FilePath ./publish-single-final/hashes.txt

    # 👇 5. Генерация хэшей для портабельной версии
    - name: Generate Portable Hashes
      run: |
        $files = Get-ChildItem -Path ./publish-portable -Recurse -File | Where-Object { $_.Extension -notin '.pdb' }
        $hashFilePath = "./publish-portable/hashes.txt"
        "Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')`n" | Out-File -FilePath $hashFilePath
        foreach ($file in $files) {
          $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash
          "$hash  $($file.Name)" | Out-File -FilePath $hashFilePath -Append
        }

    # 👇 6. Создание релиза и загрузка файлов
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## 🚀 Что нового?
          Автоматическая сборка релиза.
          
          ## 📦 Скачать
          
          ### 🪟 Single EXE (рекомендуется)
          - **Один файл** — скачайте и запустите.
          - Не требует установки .NET Runtime.
          - Размер: ~50-70 MB.
          
          ### 📂 Portable ZIP
          - **Архив** — распакуйте и запустите.
          - Требует установленный .NET 8.0 Runtime.
          - Размер: ~5-10 MB.
          
          ## 🔐 Хэши SHA256
          - Файл `hashes.txt` в каждом релизе.
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./WPF-Sorter-2.0-Portable.zip
          ./publish-single-final/WPF-Sorter-2.0.exe
          ./publish-single-final/hashes.txt