name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Запуск при создании тега v1.0.0, v1.1.0 и т.д.
  workflow_dispatch:  # Возможность запустить вручную из интерфейса GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore WPF-Sorter-2.0/WPF-Sorter-2.0.csproj

    - name: Build
      run: dotnet build WPF-Sorter-2.0/WPF-Sorter-2.0.csproj --configuration Release --no-restore

    - name: Publish as portable exe
      run: dotnet publish WPF-Sorter-2.0/WPF-Sorter-2.0.csproj --configuration Release --runtime win-x64 --self-contained false --output ./publish

    - name: Generate SHA256 hashes
      run: |
        $files = Get-ChildItem -Path ./publish -Recurse -File | Where-Object { $_.Extension -notin '.pdb' }
        $hashFilePath = "./publish/hashes.txt"
        "Generated: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')`n" | Out-File -FilePath $hashFilePath
        foreach ($file in $files) {
          $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash
          "$hash  $($file.Name)" | Out-File -FilePath $hashFilePath -Append
        }

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## Что нового?
          Автоматическая сборка релиза.
          
          **Файлы:**
          - Приложение собрано и заархивировано.
          - Приложен файл с хэшами (hashes.txt).
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          ./publish/**